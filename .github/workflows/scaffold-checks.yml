name: Scaffold Checks
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scaffold-lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: AI RMF artifact check
        run: python tools/ci/ai_rmf_validate_artifacts.py
      - name: AI Act technical file check
        run: python tools/ci/ai_act_lint.py
      - name: Log schema validation
        run: python tools/ci/validate_log_schema.py
      - name: Scaffold adoption check
        continue-on-error: true  # Non-blocking until templates are customized
        run: python tools/ci/validate_scaffold_adoption.py
