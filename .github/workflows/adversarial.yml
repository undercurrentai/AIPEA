# Nightly adversarial-corpus evaluation — non-gating trend-tracker.
#
# This workflow runs the AIPEA adversarial evaluation suite (`make
# adversarial`) once per day and writes per-corpus hit-rates to the
# GitHub Step Summary so trend evolution is visible in the Actions UI
# without committing to the repo. The `test` job in `ci.yml` already
# gates the bright-line tier on every PR; this workflow exists for the
# wider extended-tier corpora that intentionally do not block merges.
#
# Reference: ADR-005 §C.1 counter-proposal (PR #52 VC-review response,
# 2026-04-24) — "non-gating initially; new regex patterns ship when
# benchmark surfaces paraphrase gaps."

name: adversarial-nightly

on:
  schedule:
    - cron: '37 4 * * *'  # 04:37 UTC daily; offset from compliance-nightly's 03:17.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  nightly:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run adversarial evaluation (extended tier)
        id: adversarial
        continue-on-error: true  # non-gating per ADR-005 §C.1
        run: |
          # Run the extended-tier no-regression checks (per-source + flat).
          # Bright-line tier is already gating in ci.yml; do not re-run
          # it here. `--no-cov` skips the 75% floor; orthogonal concern.
          pytest tests/test_adversarial.py::TestExtendedBaseline \
                 tests/test_adversarial.py::TestExtendedBaselinePerSource \
                 -v --no-cov

      - name: Render per-corpus hit-rates to GitHub Step Summary
        if: always()
        run: |
          python tests/render_adversarial_summary.py >> "$GITHUB_STEP_SUMMARY"

      - name: Upload per-corpus baseline snapshot as artifact
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4
        with:
          name: adversarial-baseline-${{ github.run_id }}
          path: tests/fixtures/adversarial/baseline.json
          retention-days: 30

      # Note: this workflow does NOT regenerate the baseline. Re-baselining
      # is an explicit, reviewed action via `make adversarial-update-baseline`
      # on a feature branch, ensuring corpus / scanner changes go through
      # human review before the snapshot moves.
