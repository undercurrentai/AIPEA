name: AI Second Review

# Automated dual-AI second-reviewer gate for security-critical PRs.
# ROADMAP §P5a + Wave C1 of the 2026-04-11 consolidated investor-review
# response plan. Closes the bus-factor-1 finding from both investor
# reviews (positive §P5a and adversarial §5.1).
#
# Mechanism: when a pull request touches any path in the `paths:` filter
# below, three parallel jobs run against the PR diff:
#
#   - gpt-review    : calls gpt-5.4-pro via the OpenAI Responses API in
#                     background mode with reasoning effort=high, then
#                     polls for completion. Posts findings as a PR
#                     comment and writes them to the job summary.
#
#   - codex-review  : uses the official openai/codex-action@v1, which
#                     installs the Codex CLI, starts a Responses-API
#                     proxy, and runs `codex exec` in read-only sandbox
#                     mode against the diff. Posts a second PR comment.
#
#   - claude-review : uses the official anthropics/claude-code-action@v1.
#                     Reads the project's CLAUDE.md natively for full
#                     context. Posts a third PR comment.
#
# All three jobs are configured as required status checks via branch
# protection. @joshuakirby remains the accountable human reviewer via
# .github/CODEOWNERS — the AI jobs augment human judgment, they do not
# replace it.
#
# Required repo secrets (set via `gh secret set`):
#
#   - OPENAI_API_KEY    : OpenAI API key with gpt-5.4-pro access. Used
#                         by gpt-review and codex-review (codex-action
#                         starts its own Responses API proxy from the
#                         same key).
#   - ANTHROPIC_API_KEY : Anthropic API key for claude-review. Bills to
#                         the Anthropic org that generated the key.
#
# Design notes:
#   - gpt-5.4-pro is Responses-API-only (per the model card at
#     platform.openai.com/docs/models/gpt-5.4-pro) and "may take several
#     minutes to finish; use background mode to avoid timeouts". The
#     gpt_review.py script uses background=True + polling with a
#     25-minute cap inside a 30-minute job timeout.
#   - Review bodies are passed to actions/github-script via $GITHUB_ENV
#     multiline vars (process.env.REVIEW_BODY) rather than reading the
#     file from disk inside the script. The env-var approach is cleaner
#     for multi-KB review bodies and keeps the script block dependency-
#     free — the earlier shell step is the only filesystem touchpoint.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/aipea/security.py"
      - "src/aipea/__init__.py"
      - "src/aipea/errors.py"
      - "pyproject.toml"
      - ".github/workflows/**"
      - ".github/CODEOWNERS"

permissions:
  contents: read
  pull-requests: write  # post PR comments
  id-token: write       # required by anthropics/claude-code-action@v1 (OIDC)

concurrency:
  # Cancel superseded runs if the PR is updated mid-review — no point
  # reviewing a stale diff.
  group: ai-second-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # Paths passed to git diff so both jobs review the same surface.
  # Keep this list in sync with the `on.pull_request.paths` filter above.
  GATED_PATHS: >-
    src/aipea/security.py
    src/aipea/__init__.py
    src/aipea/errors.py
    pyproject.toml
    .github/workflows/
    .github/CODEOWNERS

jobs:
  gpt-review:
    name: GPT 5.4 Pro review
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # gpt-5.4-pro at effort=high on a real security diff can take 5-15
    # minutes. 30 minutes leaves headroom for polling overhead and the
    # openai>=2.11 install step.
    timeout-minutes: 30
    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Fetch base ref
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"

      - name: Compute diff against base
        id: diff
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.ref }}"
          # shellcheck disable=SC2086  # word-splitting GATED_PATHS is intentional
          git diff "origin/${base}...HEAD" -- ${GATED_PATHS} > pr_diff.patch
          if [ ! -s pr_diff.patch ]; then
            echo "diff_empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          diff_bytes=$(wc -c < pr_diff.patch)
          echo "diff_bytes=${diff_bytes}" >> "$GITHUB_OUTPUT"
          echo "PR diff: ${diff_bytes} bytes"
          # Cap diff at ~200 KB to keep well under the model's context
          # budget even after system prompt + reasoning tokens.
          if [ "${diff_bytes}" -gt 204800 ]; then
            head -c 204800 pr_diff.patch > pr_diff.truncated
            printf '\n[... diff truncated at 200 KB for review budget ...]\n' >> pr_diff.truncated
            mv pr_diff.truncated pr_diff.patch
            echo "diff_truncated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install OpenAI SDK
        if: steps.diff.outputs.diff_empty != 'true'
        run: pip install --quiet "openai>=2.11"

      - name: Run gpt-5.4-pro review
        if: steps.diff.outputs.diff_empty != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_REPO: ${{ github.repository }}
          AIPEA_REVIEW_MODEL: gpt-5.4-pro
          AIPEA_REVIEW_EFFORT: high
          AIPEA_REVIEW_POLL_TIMEOUT_SECONDS: "1500"  # 25 minutes
          AIPEA_REVIEW_POLL_INTERVAL_SECONDS: "5"
        run: |
          python .github/scripts/gpt_review.py \
            --diff pr_diff.patch \
            --output gpt_review.md

      - name: Load review body into env
        # always() so a failed review step still posts the fallback
        # markdown that gpt_review.py writes before exiting non-zero.
        if: always() && steps.diff.outputs.diff_empty != 'true'
        run: |
          if [ ! -s gpt_review.md ]; then
            printf '_Review produced no output. Check the workflow logs for details._\n' > gpt_review.md
          fi
          delimiter="__AIPEA_REVIEW_BODY_EOF_${{ github.run_id }}__"
          {
            printf '%s<<%s\n' "REVIEW_BODY" "${delimiter}"
            cat gpt_review.md
            printf '\n%s\n' "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Post review comment (gpt-5.4-pro)
        # always() so failures are still communicated via PR comment.
        # The job itself still exits non-zero because the earlier
        # review step failed — fail-closed semantics are preserved.
        if: always() && steps.diff.outputs.diff_empty != 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const body = process.env.REVIEW_BODY || '(review produced no output)';
            const marker = '<!-- ai-second-review:gpt -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const header = '## 🤖 gpt-5.4-pro — Second-Reviewer Gate';
            const footer = '---\n*Automated via `.github/workflows/ai-second-review.yml` (Wave C1 — ROADMAP §P5a). '
                         + 'Accountable human reviewer: @joshuakirby. '
                         + 'See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) §Second-Reviewer Gate.*';
            const full = `${marker}\n\n${header}\n\n${body}\n\n${footer}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: full });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: full });
            }

      - name: Write review to job summary
        if: always() && steps.diff.outputs.diff_empty != 'true'
        run: |
          {
            printf '## gpt-5.4-pro — Second-Reviewer Gate\n\n'
            if [ -s gpt_review.md ]; then
              cat gpt_review.md
            else
              printf '_Review produced no output (check logs)._\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce verdict
        # Fail-closed: missing/empty review or REQUEST_CHANGES both block.
        # Only explicit APPROVE or COMMENT passes the gate.
        if: always() && steps.diff.outputs.diff_empty != 'true'
        run: |
          if [ ! -s gpt_review.md ]; then
            echo "::error::gpt-5.4-pro review file missing or empty — fail closed."
            exit 1
          fi
          # Extract the first non-blank line after "## Verdict", strip backticks and whitespace
          verdict=$(sed -n '/^## *Verdict/,/^##/{/^## *Verdict/d;/^##/d;/^$/d;p;}' gpt_review.md \
            | head -1 | tr -d '`' | xargs)
          # Normalise to uppercase for exact match
          verdict_upper=$(echo "${verdict}" | tr '[:lower:]' '[:upper:]')
          case "${verdict_upper}" in
            APPROVE|COMMENT)
              echo "Verdict: ${verdict} — no blocking concerns."
              ;;
            REQUEST_CHANGES)
              echo "::error::gpt-5.4-pro verdict: REQUEST_CHANGES — PR must address blocking concerns before merge."
              exit 1
              ;;
            *)
              echo "::error::gpt-5.4-pro verdict '${verdict:-<empty>}' not recognised — fail closed."
              exit 1
              ;;
          esac

      - name: No-op for empty diff
        if: steps.diff.outputs.diff_empty == 'true'
        run: echo "PR diff is empty against the base ref — nothing to review."

  codex-review:
    name: Codex CLI review
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Codex's shell-exploration phase on a security diff runs longer than
    # a pure-model review. 30 minutes gives us headroom on tough diffs.
    timeout-minutes: 30
    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base ref
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"

      - name: Compute diff against base
        id: diff
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.ref }}"
          # shellcheck disable=SC2086
          git diff "origin/${base}...HEAD" -- ${GATED_PATHS} > pr_diff.patch
          if [ ! -s pr_diff.patch ]; then
            echo "diff_empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          diff_bytes=$(wc -c < pr_diff.patch)
          echo "PR diff: ${diff_bytes} bytes"
          if [ "${diff_bytes}" -gt 204800 ]; then
            head -c 204800 pr_diff.patch > pr_diff.truncated
            printf '\n[... diff truncated at 200 KB for review budget ...]\n' >> pr_diff.truncated
            mv pr_diff.truncated pr_diff.patch
          fi

      - name: Run Codex review
        id: codex
        if: steps.diff.outputs.diff_empty != 'true'
        # Official OpenAI action. Installs the Codex CLI, starts a
        # Responses-API proxy from the OPENAI_API_KEY input, and runs
        # `codex exec` under the chosen sandbox strategy. See
        # developers.openai.com/codex/github-action/ for the input
        # reference. SHA-pinned per repo convention.
        uses: openai/codex-action@0b91f4a2703c23df3102c3f0967d3c6db34eedef # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/second-review.md
          output-file: codex_review.md
          # gpt-5.3-codex is OpenAI's "primary choice for coding and
          # development tasks" — specialized for agentic coding, code
          # editing, and tool-heavy workflows. Using gpt-5.4-pro here
          # caused 15+ minute runtimes because pro takes 2-5 min per
          # turn in Codex's multi-turn agent loop. The GPT review job
          # keeps gpt-5.4-pro (single API call, background mode).
          # See Context7 /openai/codex → OpenAI Models Reference.
          model: gpt-5.3-codex
          effort: high
          sandbox: read-only
          # safety-strategy: read-only avoids the `drop-sudo` verification
          # check that fails on Blacksmith runners (where sudo remains
          # passwordless via /etc/sudoers.d entries even after
          # `deluser runner sudo`). `read-only` executes Codex in a
          # read-only mount without touching sudo at all. See
          # docs/claude/audits/ai-second-review-dry-run-2026-04-11.md §5
          # for the Blacksmith interaction and the Context7 verification
          # pass against the openai/codex-action docs.
          safety-strategy: read-only

      - name: Load review body into env
        # always() so a failed Codex run still surfaces its fallback
        # markdown on the PR. See the GPT job's equivalent note.
        if: always() && steps.diff.outputs.diff_empty != 'true'
        run: |
          if [ ! -s codex_review.md ]; then
            printf '_Codex review produced no output. Check the workflow logs for details._\n' > codex_review.md
          fi
          delimiter="__AIPEA_REVIEW_BODY_EOF_${{ github.run_id }}__"
          {
            printf '%s<<%s\n' "REVIEW_BODY" "${delimiter}"
            cat codex_review.md
            printf '\n%s\n' "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Post review comment (Codex)
        # always() so failures are still communicated via PR comment.
        # Job still exits non-zero because the codex-action step
        # failed — fail-closed semantics preserved.
        if: always() && steps.diff.outputs.diff_empty != 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const body = process.env.REVIEW_BODY || '(review produced no output)';
            const marker = '<!-- ai-second-review:codex -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const header = '## 🤖 Codex CLI — Second-Reviewer Gate';
            const footer = '---\n*Automated via `.github/workflows/ai-second-review.yml` (Wave C1 — ROADMAP §P5a). '
                         + 'Accountable human reviewer: @joshuakirby. '
                         + 'See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) §Second-Reviewer Gate.*';
            const full = `${marker}\n\n${header}\n\n${body}\n\n${footer}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: full });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: full });
            }

      - name: Write review to job summary
        if: always() && steps.diff.outputs.diff_empty != 'true'
        run: |
          {
            printf '## Codex CLI — Second-Reviewer Gate\n\n'
            if [ -s codex_review.md ]; then
              cat codex_review.md
            else
              printf '_Codex review produced no output (check logs)._\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce verdict
        if: always() && steps.diff.outputs.diff_empty != 'true'
        run: |
          if [ ! -s codex_review.md ]; then
            echo "::error::Codex review file missing or empty — fail closed."
            exit 1
          fi
          verdict=$(sed -n '/^## *Verdict/,/^##/{/^## *Verdict/d;/^##/d;/^$/d;p;}' codex_review.md \
            | head -1 | tr -d '`' | xargs)
          verdict_upper=$(echo "${verdict}" | tr '[:lower:]' '[:upper:]')
          case "${verdict_upper}" in
            APPROVE|COMMENT)
              echo "Verdict: ${verdict} — no blocking concerns."
              ;;
            REQUEST_CHANGES)
              echo "::error::Codex verdict: REQUEST_CHANGES — PR must address blocking concerns before merge."
              exit 1
              ;;
            *)
              echo "::error::Codex verdict '${verdict:-<empty>}' not recognised — fail closed."
              exit 1
              ;;
          esac

      - name: No-op for empty diff
        if: steps.diff.outputs.diff_empty == 'true'
        run: echo "PR diff is empty against the base ref — nothing to review."

  claude-review:
    name: Claude Opus 4.6 review
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Uses the official claude-code-action following the "Review Critical
    # Files" pattern from docs/solutions.md.  Claude reads CLAUDE.md
    # natively — AIPEA's agent contract with ASK-first triggers, security
    # requirements, and module dependency graph are absorbed as context
    # automatically.  The action posts its review as a PR comment via
    # `gh pr comment`; we then scrape that comment for verdict enforcement.
    timeout-minutes: 15
    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Run Claude review
        id: claude
        uses: anthropics/claude-code-action@c7c8889b30499b4e46f4c32b892e43cd364bc2fe # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the Claude half of AIPEA's triple-AI second-reviewer gate.
            Your counterparts are gpt-5.4-pro and Codex CLI. All three reviews
            must pass before the PR can merge.

            This PR touches security-gated paths. Review the changes with focus on:
            - Bugs and security regressions in security.py
            - Compliance-behavior changes
            - Public-API mistakes in __init__.py
            - CI workflow safety (.github/workflows/)

            You have access to CLAUDE.md which defines project conventions,
            ASK-first triggers, and security requirements. Flag violations that
            GPT/Codex (which lack CLAUDE.md) might miss.

            Post your review as a SINGLE PR comment using:
            gh pr comment ${{ github.event.pull_request.number }} --body "YOUR REVIEW"

            Your review comment MUST start with <!-- ai-second-review:claude -->
            and include these sections in order:
            ## Verdict
            One of: APPROVE, REQUEST_CHANGES, COMMENT.
            ## Blocking concerns
            Bulleted list with file:line evidence. _None._ if APPROVE/COMMENT.
            ## Non-blocking observations
            ## Specific line callouts
            ## What I did NOT review
          claude_args: |
            --model claude-opus-4-6 --allowedTools "Read,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(cat pr_diff.patch)"

      - name: Scrape verdict from PR comment
        if: always()
        id: verdict
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const marker = '<!-- ai-second-review:claude -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const review = comments
              .filter((c) => c.body && c.body.includes(marker))
              .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];

            if (!review) {
              core.setFailed('Claude review comment not found — fail closed.');
              return;
            }

            // Extract verdict: first non-empty line after "## Verdict"
            const lines = review.body.split('\n');
            let inVerdict = false;
            let verdict = '';
            for (const line of lines) {
              if (/^## *Verdict/.test(line)) { inVerdict = true; continue; }
              if (inVerdict && /^##/.test(line)) break;
              if (inVerdict && line.trim()) {
                verdict = line.replace(/`/g, '').trim().toUpperCase();
                break;
              }
            }

            core.info(`Claude verdict: ${verdict}`);
            core.setOutput('verdict', verdict);

            // Write review to job summary
            const header = '## 🤖 Claude Opus 4.6 — Second-Reviewer Gate';
            const footer = '---\n*Automated via `.github/workflows/ai-second-review.yml` (Wave C1 — ROADMAP §P5a). Accountable human reviewer: @joshuakirby.*';
            await core.summary.addRaw(`${header}\n\n${review.body}\n\n${footer}`).write();

      - name: Enforce verdict
        if: always()
        run: |
          verdict="${{ steps.verdict.outputs.verdict }}"
          case "${verdict}" in
            APPROVE|COMMENT)
              echo "Verdict: ${verdict} — no blocking concerns."
              ;;
            REQUEST_CHANGES)
              echo "::error::Claude verdict: REQUEST_CHANGES — PR must address blocking concerns before merge."
              exit 1
              ;;
            "")
              echo "::error::Claude verdict empty — fail closed."
              exit 1
              ;;
            *)
              echo "::error::Claude verdict '${verdict}' not recognised — fail closed."
              exit 1
              ;;
          esac
