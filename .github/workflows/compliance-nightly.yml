# Nightly compliance scans — adapted from Engineering Standards Appendix E.
name: compliance-nightly
on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Dependency scan (pip)
        run: |
          pip install safety
          safety check --full-report || true

      - name: Container scan (Trivy full)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      - name: IaC scan (Checkov)
        run: |
          pip install checkov
          checkov --compact -d . --skip-check CKV_GHA_7

      - name: Full mutation testing
        continue-on-error: true  # Informational — mutmut 3.x has enum trampoline bugs
        run: |
          if [ -d tests ]; then pip install mutmut && mutmut run; fi
